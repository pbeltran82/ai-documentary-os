name: Visual Architecture Preview

on:
  push:
    branches: [feature/visual-architecture-v1]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  render-preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Render cinematic visual preview
        shell: bash
        run: |
          set +e
          python scripts/render_visual_architecture_preview.py 2>&1 | tee visual-preview.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload cinematic preview and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-architecture-preview
          path: |
            backend/visual-architecture-preview
            backend/visual-preview.log
          if-no-files-found: warn
          retention-days: 14
